# Configuracao de Controle Otimo - Pontryagin SEIR
# Este arquivo define parametros para resolver o problema de controle otimo
# usando o Principio do Maximo de Pontryagin aplicado ao modelo SEIR

# Modelo SEIR
model:
  # Arquivo com parametros identificados (beta, sigma, gamma)
  parameters_file: "results/parameters/seir_params.json"

# Variaveis de Controle
control:
  # u1: Intensidade de distanciamento social/lockdown
  u1_lockdown:
    description: "Intensidade de distanciamento social"
    min: 0.0        # Sem restricoes
    max: 0.8        # Lockdown total (1.0) e inviavel

  # u2: Taxa de vacinacao (pessoas/dia)
  u2_vaccination:
    description: "Taxa de vacinacao (pessoas/dia)"
    min: 0.0        # Sem vacinacao
    max: 5000.0     # Capacidade maxima de vacinacao

# Funcao de Custo
cost:
  # Pesos do custo instantaneo L(x,u,t) = w1*I + w2*u1^2 + w3*u2^2
  weights:
    w1_infections: 1.0e6      # Peso de infeccoes I(t)
    w2_lockdown: 1.0e3        # Peso de lockdown u1^2
    w3_vaccination: 1.0e2     # Peso de vacinacao u2^2
    wf_terminal: 5.0e6        # Peso terminal I(T)

  # Horizonte de controle (dias)
  horizon_days: 365

# Solver Pontryagin
solver:
  method: "shooting"          # Metodo: shooting ou collocation
  n_time_points: 365          # Numero de pontos temporais
  tolerance: 1.0e-6           # Tolerancia de convergencia
  max_iterations: 100         # Maximo de iteracoes

# Condicoes Iniciais
initial_conditions:
  # Usar ultimo ponto dos dados identificados
  use_last_data_point: true

# Saida
output:
  results_dir: "results/control/pontryagin/seir"
  save_trajectories: true
  save_states: true
  save_figures: true

  # Configuracoes de figuras
  figures:
    format: "png"
    dpi: 300
    figsize: [12, 8]
    save_dir: "results/figures/control/pontryagin_seir"  # Pasta organizada por metodo e modelo
